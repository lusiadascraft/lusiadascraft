name: Atualizar estatísticas por plugin

"on":
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/update-code-stats.yml"
      - ".github/workflows/update-code-stats-por-plugin.yml"
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  update-code-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Obter o repositório do perfil
        uses: actions/checkout@v6

      - name: Instalar o CLOC
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Obter os repositórios públicos e privados
        env:
          GH_TOKEN: ${{ secrets.CODE_STATS_TOKEN }}
          PROFILE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "O secret CODE_STATS_TOKEN não está configurado."
            exit 1
          fi

          rm -rf repositories repos.tsv cloned-repos.tsv
          mkdir -p repositories
          : > cloned-repos.tsv

          gh api --paginate \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "user/repos?per_page=100&visibility=all&affiliation=owner&sort=full_name" \
            --jq '
              .[]
              | select(.fork == false)
              | select(.archived == false)
              | select(.disabled == false)
              | [.full_name, .name, (.private | tostring)]
              | @tsv
            ' > repos.tsv

          CLONED_COUNT=0
          FAILED_COUNT=0
          INDEX=0

          while IFS=$'\t' read -r FULL_NAME REPOSITORY_NAME IS_PRIVATE; do
            if [ -z "$FULL_NAME" ]; then
              continue
            fi

            if [ "$FULL_NAME" = "$PROFILE_REPOSITORY" ]; then
              continue
            fi

            INDEX=$((INDEX + 1))
            TARGET="repositories/plugin_${INDEX}"

            if gh repo clone "$FULL_NAME" "$TARGET" -- \
              --depth 1 \
              --quiet > /dev/null 2>&1; then
              printf '%s\t%s\t%s\n' \
                "$TARGET" \
                "$REPOSITORY_NAME" \
                "$IS_PRIVATE" >> cloned-repos.tsv

              CLONED_COUNT=$((CLONED_COUNT + 1))
            else
              rm -rf "$TARGET"
              FAILED_COUNT=$((FAILED_COUNT + 1))
            fi
          done < repos.tsv

          echo "REPO_COUNT=$CLONED_COUNT" >> "$GITHUB_ENV"
          echo "FAILED_COUNT=$FAILED_COUNT" >> "$GITHUB_ENV"

          echo "Plugins analisados: $CLONED_COUNT"
          echo "Plugins que não foram analisados: $FAILED_COUNT"

      - name: Analisar os plugins e atualizar o README
        env:
          FAILED_COUNT: ${{ env.FAILED_COUNT }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          import textwrap
          from collections import defaultdict
          from pathlib import Path

          EXCLUDED_DIRECTORIES = (
              ".git,.github,.idea,libs,raget,target,build,node_modules,"
              "dist,out,.gradle,vendor,generated,logs,cache"
          )

          EXCLUDED_EXTENSIONS = "md,txt,rst,adoc,log"

          LANGUAGE_ICONS = {
              "Java": "☕",
              "Kotlin": "🟣",
              "JavaScript": "🟨",
              "TypeScript": "🔷",
              "Python": "🐍",
              "C#": "🟪",
              "C++": "🔵",
              "C": "🔵",
              "Lua": "🌙",
              "PHP": "🐘",
              "SQL": "🗄️",
              "YAML": "⚙️",
              "JSON": "📦",
              "XML": "📄",
              "HTML": "🌐",
              "CSS": "🎨",
              "Bourne Shell": "🐚",
              "PowerShell": "💠",
          }

          LANGUAGE_NAMES = {
              "Bourne Shell": "Shell",
          }

          def format_number(value):
              return f"{int(value):,}".replace(",", " ")

          def format_percentage(value):
              return f"{value:.1f}".replace(".", ",")

          def create_bar(percentage):
              filled = max(0, min(10, round(percentage / 10)))
              return "█" * filled + "░" * (10 - filled)

          def count_lines(data):
              return int(data.get("code", 0)) + int(data.get("comment", 0))

          def analyse_repository(path, output_file):
              command = [
                  "cloc",
                  str(path),
                  f"--exclude-dir={EXCLUDED_DIRECTORIES}",
                  f"--exclude-ext={EXCLUDED_EXTENSIONS}",
                  "--json",
                  f"--out={output_file}",
              ]

              subprocess.run(
                  command,
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )

              if not output_file.exists():
                  return {"SUM": {"code": 0, "comment": 0, "nFiles": 0}}

              try:
                  return json.loads(output_file.read_text(encoding="utf-8"))
              except (json.JSONDecodeError, OSError):
                  return {"SUM": {"code": 0, "comment": 0, "nFiles": 0}}

          metadata_file = Path("cloned-repos.tsv")
          stats_directory = Path("repository-stats")
          stats_directory.mkdir(exist_ok=True)

          repositories = []

          if metadata_file.exists():
              for line in metadata_file.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue

                  path_value, name, is_private = line.split("\t", 2)
                  repositories.append({
                      "path": Path(path_value),
                      "name": name,
                      "private": is_private == "true",
                  })

          repository_stats = []
          language_totals = defaultdict(int)
          total_lines = 0
          total_files = 0

          for index, repository in enumerate(repositories, start=1):
              output_file = stats_directory / f"repository_{index}.json"
              result = analyse_repository(repository["path"], output_file)
              totals = result.get("SUM", {})

              lines = count_lines(totals)
              files = int(totals.get("nFiles", 0))
              languages = []

              for language, data in result.items():
                  if language in {"header", "SUM"}:
                      continue

                  if not isinstance(data, dict):
                      continue

                  language_lines = count_lines(data)

                  if language_lines <= 0:
                      continue

                  languages.append((language, language_lines))
                  language_totals[language] += language_lines

              languages.sort(key=lambda item: item[1], reverse=True)
              main_language = languages[0][0] if languages else None

              repository_stats.append({
                  "name": repository["name"],
                  "private": repository["private"],
                  "lines": lines,
                  "files": files,
                  "main_language": main_language,
              })

              total_lines += lines
              total_files += files

          repository_stats.sort(
              key=lambda repository: (-repository["lines"], repository["name"].lower())
          )

          repository_rows = []

          for repository in repository_stats:
              visibility = "🔒" if repository["private"] else "🌐"
              language = repository["main_language"]

              if language:
                  icon = LANGUAGE_ICONS.get(language, "💻")
                  display_name = LANGUAGE_NAMES.get(language, language)
                  language_text = f"{icon} `{display_name}`"
              else:
                  language_text = "—"

              repository_rows.append(
                  f"| {visibility} `{repository['name']}` "
                  f"| **{format_number(repository['lines'])}** "
                  f"| **{format_number(repository['files'])}** "
                  f"| {language_text} |"
              )

          if repository_rows:
              repositories_table = "\n".join([
                  "| Plugin | Linhas de código | Ficheiros | Linguagem principal |",
                  "|:--|--:|--:|:--|",
                  *repository_rows,
              ])
          else:
              repositories_table = "_Ainda não existem plugins para apresentar._"

          sorted_languages = sorted(
              language_totals.items(),
              key=lambda item: item[1],
              reverse=True,
          )

          displayed_languages = sorted_languages[:6]
          remaining_languages = sorted_languages[6:]
          language_rows = []

          for language, lines in displayed_languages:
              percentage = lines / total_lines * 100 if total_lines else 0
              icon = LANGUAGE_ICONS.get(language, "💻")
              display_name = LANGUAGE_NAMES.get(language, language)
              bar = create_bar(percentage)

              language_rows.append(
                  f"| {icon} `{display_name}` "
                  f"| **{format_number(lines)}** "
                  f"| `{bar}` {format_percentage(percentage)}% |"
              )

          if remaining_languages:
              other_lines = sum(lines for _, lines in remaining_languages)
              percentage = other_lines / total_lines * 100 if total_lines else 0
              bar = create_bar(percentage)

              language_rows.append(
                  f"| 📚 `Outras` "
                  f"| **{format_number(other_lines)}** "
                  f"| `{bar}` {format_percentage(percentage)}% |"
              )

          if language_rows:
              languages_table = "\n".join([
                  "| Linguagem | Linhas de código | Utilização |",
                  "|:--|--:|:--|",
                  *language_rows,
              ])
          else:
              languages_table = "_Ainda não existem linguagens para apresentar._"

          failed_count = int(os.environ.get("FAILED_COUNT", "0"))
          warning = ""

          if failed_count > 0:
              warning = (
                  "\n\n> ⚠️ Não foi possível analisar "
                  f"{format_number(failed_count)} plugin(s)."
              )

          block = f"""
          <!-- CODE-STATS:START -->
          ## 🧩 Plugins/softwares personalizados do LusíadasCraft

          > Estas estatísticas incluem os plugins/softwares personalizados desenvolvidos para o **LusíadasCraft**.

          ### 📊 Visão geral

          | 💻 Linhas de código | 🧩 Plugins/softwares analisados | 📄 Ficheiros |
          |:--:|:--:|:--:|
          | **{format_number(total_lines)}** | **{format_number(len(repository_stats))}** | **{format_number(total_files)}** |

          ### 📦 Estatísticas por plugin

          {repositories_table}

          ### 🛠️ Linguagens utilizadas

          {languages_table}
          {warning}
          <!-- CODE-STATS:END -->
          """

          block = textwrap.dedent(block).strip()
          readme = Path("README.md")
          content = readme.read_text(encoding="utf-8") if readme.exists() else ""

          pattern = (
              r"<!-- CODE-STATS:START -->"
              r".*?"
              r"<!-- CODE-STATS:END -->"
          )

          if re.search(pattern, content, flags=re.DOTALL):
              content = re.sub(pattern, block, content, flags=re.DOTALL)
          else:
              content = content.rstrip() + "\n\n" + block + "\n"

          readme.write_text(content, encoding="utf-8")
          PY

      - name: Guardar as alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "Não existem alterações para guardar."
            exit 0
          fi

          git commit -m "Atualizar estatísticas por plugin"
          git push
